services:
  - type: web
    name: data-assistant-backend
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: "backend"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false # You will enter this securely in Render dashboard
